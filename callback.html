<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>OAuth Callback — Codigo Executivo</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #eee;
      max-width: 720px;
      margin: 60px auto;
      padding: 24px;
      line-height: 1.6;
    }
    h1 { font-size: 1.4em; margin-bottom: 8px; }
    p { color: #aaa; margin-bottom: 16px; }
    .box {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 16px;
      margin: 16px 0;
    }
    .label {
      font-size: .75em;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 8px;
    }
    code {
      display: block;
      background: #000;
      color: #f5c542;
      padding: 12px;
      border-radius: 6px;
      font-family: "Consolas", "Monaco", monospace;
      word-break: break-all;
      font-size: .9em;
    }
    button {
      background: #3498db;
      color: #fff;
      border: 0;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: .9em;
      cursor: pointer;
      margin-top: 12px;
    }
    button:hover { background: #2980b9; }
    .ok { color: #27ae60; }
    .err { color: #e74c3c; }
  </style>
</head>
<body>
  <h1>OAuth Callback — Codigo Executivo Analytics</h1>
  <p id="status">Processando…</p>

  <div id="success" style="display:none">
    <div class="box">
      <div class="label">Authorization Code</div>
      <code id="code-value"></code>
      <button onclick="copyCode()">Copiar code</button>
      <span id="copied" class="ok" style="margin-left:12px;display:none">✓ copiado</span>
    </div>
    <div class="box">
      <div class="label">State</div>
      <code id="state-value"></code>
    </div>
    <p>Cole o <strong>code</strong> de volta no terminal onde rodou <code style="display:inline;padding:2px 6px;background:#222;color:#f5c542">oauth_tiktok.py</code>.</p>
  </div>

  <div id="error" style="display:none">
    <div class="box">
      <div class="label err">Erro retornado pelo TikTok</div>
      <code id="error-value"></code>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const state = params.get("state");
    const error = params.get("error");
    const errorDesc = params.get("error_description");

    if (code) {
      document.getElementById("status").textContent = "Autorização recebida.";
      document.getElementById("status").className = "ok";
      document.getElementById("success").style.display = "block";
      document.getElementById("code-value").textContent = code;
      document.getElementById("state-value").textContent = state || "(vazio)";
    } else if (error) {
      document.getElementById("status").textContent = "Erro na autorização.";
      document.getElementById("status").className = "err";
      document.getElementById("error").style.display = "block";
      document.getElementById("error-value").textContent = error + (errorDesc ? " — " + errorDesc : "");
    } else {
      document.getElementById("status").textContent = "Nenhum code recebido. Recarregue a partir do fluxo OAuth.";
    }

    function copyCode() {
      navigator.clipboard.writeText(code).then(() => {
        document.getElementById("copied").style.display = "inline";
        setTimeout(() => { document.getElementById("copied").style.display = "none"; }, 2000);
      });
    }
  </script>
</body>
</html>
